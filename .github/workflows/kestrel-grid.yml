name: Kestrel Grid Autonomous Engine
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Core
        run: |
          pip install -r requirements.txt
          pip install playwright esprima mmh3 aiohttp aiodns rich typer pyyaml pandas
          playwright install chromium
          python -m playwright install-deps chromium
          wget -q https://github.com/projectdiscovery/interactsh/releases/download/v1.1.8/interactsh-client_1.1.8_linux_amd64.zip
          unzip -o -q interactsh-client_1.1.8_linux_amd64.zip
          sudo mv interactsh-client /usr/local/bin/
          wget -q https://github.com/projectdiscovery/nuclei/releases/download/v3.2.0/nuclei_3.2.0_linux_amd64.zip
          unzip -o -q nuclei_3.2.0_linux_amd64.zip
          sudo mv nuclei /usr/local/bin/
          nuclei -update-templates

      - name: Rotate Queue and Identify Target
        id: queue
        run: |
          TARGET=$(grep -v '^#' targets.txt | grep -v '^$' | head -n 1)
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "Scanning target: $TARGET"
          sed -i "1{h;d};\$G" targets.txt 

      - name: Execute Kestrel Core
        run: |
          TARGET=$(head -n 1 targets.txt | tr -d '\r')
          if [ -z "$TARGET" ]; then
            echo "Queue is empty. Halting execution."
            exit 0
          fi
          echo "Engaging target: $TARGET"
          python arbiter.py $TARGET --mode standard

      - name: Synthesize Training Data (ML Brain)
        run: |
          echo "Executing Random Forest Pre-processor..."
          shopt -s nullglob
      - name: Trigger Neural Network Training
        run: |
          echo "Triggering Neural Network Training..."
          curl -X POST "https://bytesyed-kestrel-brain.hf.space/train" || true
      - name: Commit and push results
        run: |
          git config --local user.email "kestrel-bot@github.com"
          git config --local user.name "Kestrel Grid"
          git add --update || true
          git commit -m "chore: Kestrel automated execution complete" || echo "No changes to commit"
          git push
