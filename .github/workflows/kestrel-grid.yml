name: Kestrel Grid Autonomous Engine
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Requirements & Playwright
        run: |
          pip install -r requirements.txt
          pip install playwright esprima mmh3 aiohttp aiodns rich typer pyyaml
          
          playwright install chromium
          python -m playwright install-deps chromium

      - name: Rotate Queue and Identify Target
        id: queue
        run: |
          TARGET=$(grep -v '^#' targets.txt | grep -v '^$' | head -n 1)
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "Scanning target: $TARGET"
          sed -i "1{h;d};\$G" targets.txt 

      - name: Execute Kestrel Strike
        run: python arbiter.py ${{ env.TARGET }} --mode standard
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SHODAN_API: ${{ secrets.SHODAN_API }}

      - name: Commit State and Rotated Queue
        run: |
          git config --local user.email "kestrel-bot@github.com"
          git config --local user.name "Kestrel Intelligence Bot"
          git add data/sessions/*.db targets.txt
          git commit -m "Queue Rotate: Finished ${{ env.TARGET }} [Automated]" || echo "No changes"
          git push origin main
