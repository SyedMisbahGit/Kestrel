name: Kestrel 24/7 Queue Strike
on:
  schedule:
    - cron: '0 */3 * * *' # Runs every 3 hours (8 times a day)
  workflow_dispatch:      # Manual trigger

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxext6 libxfixes3 librandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Install Python Requirements
        run: |
          pip install -r requirements.txt
          pip install playwright esprima mmh3 aiohttp aiodns rich typer pyyaml
          playwright install chromium

      - name: Rotate Queue and Identify Target
        id: queue
        run: |
          # Get the first line that isn't a comment or empty
          TARGET=$(grep -v '^#' targets.txt | grep -v '^$' | head -n 1)
          echo "TARGET=$TARGET" >> $GITHUB_ENV
          echo "Scanning target: $TARGET"
          
          # Move that target to the bottom of the file
          sed -i "1{h;d};\$G" targets.txt 

      - name: Execute Kestrel Strike
        run: python arbiter.py ${{ env.TARGET }} --mode standard
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          SHODAN_API: ${{ secrets.SHODAN_API }}

      - name: Commit State and Rotated Queue
        run: |
          git config --local user.email "kestrel-bot@github.com"
          git config --local user.name "Kestrel Intelligence Bot"
          git add data/sessions/*.db targets.txt
          git commit -m "Queue Rotate: Finished ${{ env.TARGET }} [Automated]" || echo "No changes"
          git push origin main
